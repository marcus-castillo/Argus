name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, type, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: citecheck
          POSTGRES_PASSWORD: citecheck
          POSTGRES_DB: citecheck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U citecheck -d citecheck_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://citecheck:citecheck@localhost:5432/citecheck_test
      UPLOAD_DIR: ${{ github.workspace }}/.uploads
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy app
      - name: Migrate
        run: alembic upgrade head
      - name: Test
        run: pytest -q

  frontend:
    name: Frontend (lint, type, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  e2e:
    name: E2E (Playwright against Docker stack)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Boot stack
        run: docker compose up -d --build
      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/health; then echo "API up"; break; fi
            sleep 3
          done
      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 >/dev/null; then echo "Frontend up"; break; fi
            sleep 3
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npx playwright test
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
